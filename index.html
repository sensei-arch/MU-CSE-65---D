<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MU CSE 65-D Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
scroll-behavior:smooth;
}

body{
background:linear-gradient(-45deg,#0f172a,#1e293b,#0f172a,#111827);
background-size:400% 400%;
animation:gradientMove 12s ease infinite;
color:white;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

nav{
position:fixed;
width:100%;
top:0;
display:flex;
justify-content:center;
gap:40px;
padding:20px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
z-index:1000;
}

nav a{
color:#cbd5e1;
text-decoration:none;
transition:0.3s;
}

nav a:hover{
color:#38bdf8;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:3rem;
background:linear-gradient(to right,#38bdf8,#a855f7);
-webkit-background-clip:text;
color:transparent;
}

section{
padding:120px 20px;
max-width:1100px;
margin:auto;
}

h2{
margin-bottom:30px;
}

.card{
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:20px;
backdrop-filter:blur(10px);
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:20px;
border-radius:10px;
border:none;
outline:none;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

th{
color:#38bdf8;
}

footer{
text-align:center;
padding:30px;
color:#94a3b8;
}

</style>
</head>

<body>

<nav>
<a href="#home">Home</a>
<a href="#students">Students</a>
</nav>

<div class="hero" id="home">
<h1>Metropolitan University</h1>
<p>CSE 65-D | Section D Official Portal</p>
</div>

<section id="students">
<h2>🎓 Student List</h2>

<input type="text" id="search" placeholder="Search student by name or ID...">

<div class="card">
<table id="studentTable">
<thead>
<tr>
<th>Name</th>
<th>Student ID</th>
<th>Section</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<h2 style="margin-top:60px;">🔁 RE Students</h2>

<div class="card">
<table id="reTable">
<thead>
<tr>
<th>Name</th>
<th>Student ID</th>
<th>Section</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</section>

<footer>
© 2026 Metropolitan University | CSE 65-D
</footer>

students.sort((a,b)=>a.id.localeCompare(b.id));
reStudents.sort((a,b)=>a.id.localeCompare(b.id));

function loadTable(data,tableId){
const table=document.querySelector(`#${tableId} tbody`);
table.innerHTML="";
data.forEach(s=>{
table.innerHTML+=`<tr>
<td>${s.name}</td>
<td>${s.id}</td>
<td>${s.section}</td>
</tr>`;
});
}

loadTable(students,"studentTable");
loadTable(reStudents,"reTable");

document.getElementById("search").addEventListener("keyup",function(){
const value=this.value.toLowerCase();
const filtered=students.filter(s=> 
s.name.toLowerCase().includes(value) || s.id.includes(value)
);
loadTable(filtered,"studentTable");
});

</script>

</body>
</html>
